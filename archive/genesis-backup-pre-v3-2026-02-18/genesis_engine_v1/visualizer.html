<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gray-Scott Reaction-Diffusion Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #a0a0b0;
            font-size: 1.1em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            margin-bottom: 20px;
        }

        .canvas-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #simulationCanvas {
            width: 100%;
            height: auto;
            border-radius: 8px;
            image-rendering: pixelated;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
        }

        .controls-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .control-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-section:last-child {
            border-bottom: none;
        }

        .control-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #b0b0c0;
            font-size: 0.9em;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.95em;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        button.danger {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .metrics-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .metric-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .metric-label {
            color: #a0a0b0;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .metric-value {
            color: #e0e0e0;
            font-size: 1.5em;
            font-weight: 600;
        }

        .metric-value.warning {
            color: #f5576c;
        }

        .metric-value.success {
            color: #4ade80;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.running {
            background: #4ade80;
        }

        .status-indicator.paused {
            background: #fbbf24;
        }

        .status-indicator.stopped {
            background: #f87171;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .param-display {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            margin-top: 10px;
        }

        .param-display div {
            margin: 3px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gray-Scott Reaction-Diffusion</h1>
            <p class="subtitle">Real-time Pattern Formation Visualizer</p>
        </header>

        <div class="main-content">
            <div class="canvas-container">
                <canvas id="simulationCanvas" width="512" height="512"></canvas>
            </div>

            <div class="controls-panel">
                <div class="control-section">
                    <h3>Pattern Presets</h3>
                    <div class="control-group">
                        <label for="presetSelect">Select Pattern</label>
                        <select id="presetSelect">
                            <option value="spots">Spots (Mitosis)</option>
                            <option value="stripes">Stripes (Labyrinthine)</option>
                            <option value="waves">Waves (Pulsating)</option>
                            <option value="coral">Coral Growth</option>
                            <option value="spirals">Spiral Waves</option>
                            <option value="moving_spots">Moving Spots</option>
                        </select>
                    </div>
                    <div class="param-display" id="paramDisplay"></div>
                </div>

                <div class="control-section">
                    <h3>Simulation Control</h3>
                    <div class="button-group">
                        <button id="startBtn">▶ Start</button>
                        <button id="pauseBtn" class="secondary">⏸ Pause</button>
                        <button id="resetBtn" class="danger">↻ Reset</button>
                        <button id="stepBtn">⏭ Step</button>
                    </div>
                </div>

                <div class="control-section">
                    <h3>Visualization</h3>
                    <div class="control-group">
                        <label for="colorScheme">Color Scheme</label>
                        <select id="colorScheme">
                            <option value="grayscale">Grayscale</option>
                            <option value="viridis">Viridis</option>
                            <option value="plasma">Plasma</option>
                            <option value="inferno">Inferno</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="speedControl">Speed (cycles/frame)</label>
                        <input type="number" id="speedControl" min="1" max="10" value="1">
                    </div>
                </div>

                <div class="control-section">
                    <h3>Status</h3>
                    <div style="margin-bottom: 10px;">
                        <span class="status-indicator stopped" id="statusIndicator"></span>
                        <span id="statusText">Stopped</span>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Cycle Count</div>
                        <div class="metric-value" id="cycleCount">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="metrics-panel">
            <h3 style="color: #667eea; margin-bottom: 20px;">Pattern Metrics</h3>
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">FPS</div>
                    <div class="metric-value success" id="fpsDisplay">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">V Mean</div>
                    <div class="metric-value" id="vMean">0.000</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">V Std Dev</div>
                    <div class="metric-value" id="vStd">0.000</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">V Range</div>
                    <div class="metric-value" id="vRange">0.000</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Pattern Stability</div>
                    <div class="metric-value" id="stability">Initializing</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Mass Conservation</div>
                    <div class="metric-value success" id="massError">0.000%</div>
                </div>
            </div>
        </div>
    </div>

    <script src="monitor.js"></script>
</body>
</html>
