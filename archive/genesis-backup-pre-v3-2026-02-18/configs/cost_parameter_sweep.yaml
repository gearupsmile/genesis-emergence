# Metabolic Cost Parameter Sweep Configuration
# Optimize coefficient and exponent for best EPC/GAC trade-off

sweep:
  name: "cost_parameter_optimization"
  description: "Find optimal metabolic cost parameters for Pareto trade-off between GAC and EPC"
  
parameters:
  coefficients: [0.001, 0.003, 0.005, 0.008, 0.01]
  exponents: [1.0, 1.3, 1.5, 1.7, 2.0]
  # Total combinations: 5 × 5 = 25

experiment:
  generations: 5000
  population_size: 50
  mutation_rate: 0.3
  simulation_steps: 10
  
logging:
  gac_interval: 500
  epc_interval: 500
  nnd_interval: 1000
  
optimization:
  primary_metric: "epc_gac_hypervolume"
  objectives:
    - maximize: "final_epc"  # Higher LZ complexity
    - balance: "final_gac"   # Moderate genome length (not too small, not bloated)
  
  constraints:
    min_gac: 10   # Genome shouldn't be too small
    max_gac: 100  # Genome shouldn't bloat
    min_epc: 0.3  # Minimum functional complexity
  
output:
  results_dir: "runs/parameter_sweep"
  summary_file: "sweep_summary.json"
  best_params_file: "best_parameters.yaml"
