# Diagnostic 10k Configuration
# Resource profiling experiment to diagnose system stability

experiment:
  name: "diagnostic_10k"
  description: "10k-gen diagnostic with resource profiling to identify stability issues"
  total_generations: 10000
  
population:
  size: 100  # Same as failed 200k run to replicate load
  mutation_rate: 0.3
  
genome:
  initial_length_min: 3
  initial_length_max: 10
  initial_linkage: "uniform"
  
world:
  type: "standard_gradient"
  resource_types: 3
  
ais:
  expiry_age: 5000
  forgetting_rate: 0.001
  viability_threshold: 0.1
  
checkpoints:
  interval: 2000  # More frequent for diagnostics
  save_full_state: true
  validate_integrity: true
  
pnct_logging:
  gac_interval: 500
  epc_interval: 500
  nnd_interval: 1000
  
progress:
  report_interval: 1000
  
monitoring:
  track_performance: true
  log_resources: true
  early_termination_threshold: 10
  resource_profiling: true  # Enable detailed resource tracking
  memory_log_interval: 100  # Log memory every 100 gens
  memory_warning_threshold: 0.8  # Warn at 80% RAM usage
  
output:
  base_dir: "runs"
  metrics_file: "pnct_metrics.csv"
  resource_profile: "resource_profile.log"
  summary_file: "diagnostic_summary.txt"
