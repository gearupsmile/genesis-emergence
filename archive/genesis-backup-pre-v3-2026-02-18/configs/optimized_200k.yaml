# Optimized 200k Deep Probe Configuration
# With quadratic metabolic cost to prevent genome bloat

experiment:
  name: "optimized_deep_probe_200k"
  description: "200k-gen experiment with quadratic cost (0.005 * genes^1.5) for controlled complexity"
  total_generations: 200000
  
population:
  size: 80  # Reduced from 100 for speed
  mutation_rate: 0.3  # Optimal from Phase 5
  
genome:
  initial_length_min: 3
  initial_length_max: 8  # Reduced from 10
  initial_linkage: "uniform"
  metabolic_cost_coefficient: 0.005
  metabolic_cost_exponent: 1.5
  
world:
  type: "standard_gradient"
  resource_types: 3
  
ais:
  expiry_age: 5000
  forgetting_rate: 0.001
  viability_threshold: 0.1
  
checkpoints:
  interval: 25000
  save_full_state: true
  
pnct_logging:
  gac_interval: 500
  epc_interval: 500
  nnd_interval: 1000
  
performance:
  target_gen_per_sec: 15
  alert_if_below: 10
  genome_length_alert: 200
  
progress:
  report_interval: 5000
