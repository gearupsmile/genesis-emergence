# Phase 6 Deep Probe Configuration
# 200,000-generation experiment to distinguish bounded equilibrium from open-ended evolution

experiment:
  name: "phase6_deep_probe"
  description: "Extended diagnostic run with full PNCT metrics"
  total_generations: 200000
  
population:
  size: 100
  mutation_rate: 0.3  # Optimal from Phase 5
  
genome:
  initial_length_min: 3
  initial_length_max: 10
  initial_linkage: "uniform"  # Each gene in own group
  
world:
  type: "standard_gradient"
  resource_types: 3  # high, medium, low
  
ais:
  expiry_age: 5000
  forgetting_rate: 0.001
  viability_threshold: 0.1
  
checkpoints:
  interval: 25000  # Every 25k generations
  save_full_state: true
  
pnct_logging:
  gac_interval: 500   # Genome Architecture Complexity
  epc_interval: 500   # Expressed Phenotype Complexity
  nnd_interval: 1000  # Normalized Novelty Distance
  
progress:
  report_interval: 5000  # Progress updates every 5k gens
  
output:
  base_dir: "runs"
  metrics_file: "pnct_metrics.csv"
  summary_file: "analysis_summary.txt"
  config_backup: "config_used.yaml"
