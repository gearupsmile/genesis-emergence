# Final Overnight Configuration
# Conservative settings optimized for laptop resources

experiment:
  name: "final_overnight_200k"
  description: "Hardened 200k-gen overnight run with conservative resource usage"
  total_generations: 200000
  
population:
  size: 50  # HALVED from 100 - critical fix for memory/CPU constraints
  mutation_rate: 0.3
  
genome:
  initial_length_min: 3
  initial_length_max: 8  # Start simpler
  initial_linkage: "uniform"
  
world:
  type: "standard_gradient"
  resource_types: 2  # Simplified from 3 to reduce overhead
  
ais:
  expiry_age: 5000
  forgetting_rate: 0.001
  viability_threshold: 0.1
  
checkpoints:
  interval: 10000  # Frequent saves - 20 checkpoints total
  save_full_state: true
  validate_integrity: true
  
pnct_logging:
  gac_interval: 1000  # Reduced logging overhead
  epc_interval: 1000
  nnd_interval: 2000
  
progress:
  report_interval: 5000
  
monitoring:
  track_performance: true
  log_resources: true
  resource_profiling: true
  memory_log_interval: 500  # Monitor every 500 gens
  memory_warning_threshold: 0.75  # Pause at 75% RAM
  early_termination_threshold: 10
  
output:
  base_dir: "runs"
  metrics_file: "pnct_metrics.csv"
  resource_profile: "resource_profile.log"
  run_log: "run.log"
  summary_file: "analysis_summary.txt"
