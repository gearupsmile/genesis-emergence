# Genesis V3 Default Configuration
# Based on V2 Optimized 200k Baseline + Secretion Physics (Experimental)

version: "3.0.0-dev"

experiment:
  name: "v3_secretion_baseline"
  description: "Initial V3 experiment with active environment secretion"
  total_generations: 5000  # Short initial run
  
population:
  size: 50
  mutation_rate: 0.3
  
genome:
  initial_length_min: 3
  initial_length_max: 8
  initial_linkage: "uniform"
  metabolic_cost_coefficient: 0.005
  metabolic_cost_exponent: 1.5
  
world:
  type: "active_secretion"  # V3 Feature
  resource_types: 3
  width: 100
  height: 100
  diffusion_rate: 0.1
  decay_rate: 0.05

secretion:
  enabled: true
  cost_per_secretion: 0.1
  radius: 1  # 3x3 neighborhood
  production_rate: 0.5
  
ais:
  expiry_age: 5000
  forgetting_rate: 0.001
  viability_threshold: 0.1
  archive_snapshots: true  # V3 Feature
  
checkpoints:
  interval: 1000
  save_full_state: true
  
pnct_logging:
  gac_interval: 100
  epc_interval: 100
  nnd_interval: 500
  
performance:
  target_gen_per_sec: 10
  alert_if_below: 5
